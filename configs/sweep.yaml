program: src/coderev/training/train_qlora.py
method: bayes
metric:
  name: eval/loss
  goal: minimize
parameters:
  lora_r:
    values: [16, 32, 64]
  lora_alpha:
    values: [32, 64, 128]
  learning_rate:
    min: 0.00005
    max: 0.0005
  per_device_train_batch_size:
    values: [2, 4, 8]
  num_train_epochs:
    values: [2, 3, 5]
