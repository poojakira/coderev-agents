base_model: codellama/CodeLlama-7b-Instruct-hf
dataset: JetBrains/code-review
max_seq_length: 2048

# LoRA
lora_r: 32
lora_alpha: 64
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
num_train_epochs: 3
learning_rate: 0.0002
warmup_ratio: 0.05
lr_scheduler_type: cosine
weight_decay: 0.01
bf16: true
seed: 42

# Output
output_dir: ./outputs/qlora-r32
save_steps: 500
logging_steps: 10
