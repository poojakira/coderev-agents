name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install bandit ruff

      - name: Run Ruff
        run: ruff check src/ tests/

      - name: Run Pytest
        run: pytest tests/ -v

      - name: Agent Smoke Test (Sample Repo)
        run: |
          # Run bandit directly on sample repo and ensure it finds issues
          bandit -r sample_repo/ -f json | grep "issue_severity" || (echo "BANDIT FAILED TO FIND ISSUES IN SAMPLE REPO" && exit 1)
          # In a real environment, we would run the LLM agent here if API keys were available
